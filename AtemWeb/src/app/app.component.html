
<div id="wrapper">

  <div>
    <h1>ME1</h1>
    <table>
      <thead>
        <tr>
          <td>PROGRAM</td>
          <td>PREVIEW</td>
        </tr>
      </thead>
      <tbody *ngIf="current && current.me1">
        <tr>
          <td>{{ current.me1.r }}</td>
          <td>{{ current.me1.g }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div>
    <h1>ME2</h1>
    <table>
      <thead>
        <tr>
          <td>PROGRAM</td>
          <td>PREVIEW</td>
        </tr>
      </thead>
      <tbody *ngIf="current && current.me1">
        <tr>
          <td>{{ current.me2.r }}</td>
          <td>{{ current.me2.g }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>


<div *ngIf="current && current.inputs" >
   <div *ngFor="let input of current.inputs"
        class="tallybox"
        [class.program]="input.r"
        [class.preview]="input.g">
     {{ input.n }}
   </div>
</div>
